<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>file-tree context menu fixture</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
      }
      file-tree-container {
        display: block;
        width: 320px;
        border: 1px solid #ccc;
      }
      [data-test-context-menu] {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 180px;
        padding: 8px;
        border: 1px solid #666;
        border-radius: 6px;
        background: #fff;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <file-tree-container id="context-menu-host"></file-tree-container>

    <script type="module">
      import '/dist/web-components.js';
      import { CONTEXT_MENU_SLOT_NAME, FileTree } from '/dist/index.js';

      const host = document.getElementById('context-menu-host');
      const slotElement = document.createElement('div');
      slotElement.setAttribute('slot', CONTEXT_MENU_SLOT_NAME);
      host.appendChild(slotElement);

      const renderMenu = (item, context) => {
        slotElement.innerHTML = `
          <div data-test-context-menu role="menu" aria-label="Demo context menu">
            <div data-test-context-menu-label>${item.path}</div>
            <button type="button" data-test-menu-delete>Delete</button>
          </div>
        `;
        const deleteButton = slotElement.querySelector(
          '[data-test-menu-delete]'
        );
        if (deleteButton instanceof HTMLButtonElement) {
          deleteButton.addEventListener(
            'click',
            () => {
              context.close();
            },
            { once: true }
          );
          // Simulate third-party menu focus behavior so we verify the
          // tree correctly restores keyboard navigation.
          requestAnimationFrame(() => deleteButton.focus());
        }
      };

      const clearMenu = () => {
        slotElement.innerHTML = '';
      };

      const fileTree = new FileTree(
        {
          initialFiles: [
            'README.md',
            'package.json',
            'src/index.ts',
            'src/components/Button.tsx',
            'src/components/Card.tsx',
          ],
        },
        {
          initialExpandedItems: ['src', 'src/components'],
          onContextMenuOpen: (item, context) => {
            renderMenu(item, context);
          },
          onContextMenuClose: () => {
            clearMenu();
          },
        }
      );
      fileTree.render({ fileTreeContainer: host });

      const waitForShadowTree = async () => {
        const started = performance.now();
        while (true) {
          const root = host.shadowRoot;
          if (
            root != null &&
            root.querySelector('button[data-type="item"]') != null
          ) {
            return;
          }
          if (performance.now() - started > 5000) {
            throw new Error('Timed out waiting for file-tree render');
          }
          await new Promise((resolve) => setTimeout(resolve, 16));
        }
      };

      await waitForShadowTree();
      window.__fileTreeFixtureReady = true;
    </script>
  </body>
</html>
